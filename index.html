<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F9FB">
<title>Training Log</title>
<style>
  :root{
    --paper:#F7F9FB; --grid:#E3E9F0; --ink:#182437; --sub:#66738A;
    --push:#E8590C; --pull:#2B8A3E; --legs:#7048E8; --cardio:#1971C2;
    --pushSoft:#FDEEE3; --cardioSoft:#E7F1FB;
    --card:#FFF; --line:#D8DFE8; --danger:#C92A2A;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --disp:'Arial Narrow','Helvetica Neue Condensed',-apple-system,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);padding-bottom:calc(84px + env(safe-area-inset-bottom))}
  header{padding:calc(14px + env(safe-area-inset-top)) 16px 10px;border-bottom:1px solid var(--grid);position:sticky;top:0;background:var(--paper);z-index:5}
  h1{font-family:var(--disp);font-size:28px;font-weight:700;letter-spacing:.01em;font-stretch:condensed}
  .legend{font-family:var(--mono);font-size:10px;color:var(--sub);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
  .legend b{font-weight:400}
  #view{padding:14px;max-width:560px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
  .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--sub);text-transform:uppercase;margin-bottom:4px}
  input,select{width:100%;padding:10px 12px;font-size:16px;font-family:var(--body);border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);outline:none;-webkit-appearance:none;appearance:none}
  input.mono{font-family:var(--mono)}
  .btn{display:block;width:100%;padding:12px 16px;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-family:var(--body)}
  .btn.ink{background:var(--ink);color:#fff}
  .btn.push{background:var(--push);color:#fff}
  .btn.cardio{background:var(--cardio);color:#fff}
  .btn.ghost{background:transparent;border:1px solid var(--cardio);color:var(--cardio)}
  .btn.soft{background:var(--pushSoft);color:var(--push);padding:9px}
  .seg{display:flex;gap:8px;margin-bottom:12px}
  .seg button{flex:1;padding:9px 4px;font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--sub)}
  .seg button.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .seg button.on.p{background:var(--push);border-color:var(--push)}
  .seg button.on.pl{background:var(--pull);border-color:var(--pull)}
  .seg button.on.l{background:var(--legs);border-color:var(--legs)}
  .h2{font-family:var(--disp);font-weight:700;font-size:18px;margin:6px 2px 8px;text-transform:uppercase;font-stretch:condensed}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal .dow{text-align:center;font-family:var(--mono);font-size:10px;color:var(--sub);padding:2px 0}
  .cal .day{aspect-ratio:1;border:1px solid var(--grid);border-radius:8px;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;padding:0}
  .cal .day.has{background:#fff}
  .cal .day.sel{border:2px solid var(--ink)}
  .cal .day.today .num{font-weight:700;text-decoration:underline}
  .cal .num{font-family:var(--mono);font-size:12px;color:var(--ink)}
  .cal .marks{height:12px;display:flex;align-items:center;gap:1px}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .runner{font-size:10px;line-height:1}
  .navbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:10;padding-bottom:env(safe-area-inset-bottom)}
  .navbar button{flex:1;padding:9px 0 10px;background:none;border:none;color:var(--sub);cursor:pointer;font-family:var(--body)}
  .navbar button.on{color:var(--ink)}
  .navbar .ic{font-size:16px;font-family:var(--mono);line-height:1}
  .navbar .tl{font-size:10px;margin-top:3px}
  .navbar button.on .tl{font-weight:700}
  .navbar .bar{height:3px;width:24px;margin:4px auto 0;border-radius:2px;background:transparent}
  .navbar button.on .bar{background:var(--ink)}
  .stat .k{font-size:9px;letter-spacing:.12em;color:var(--sub);text-transform:uppercase;font-family:var(--mono)}
  .stat .v{font-size:15px;font-weight:600;font-family:var(--mono)}
  .stats{display:flex;gap:18px}
  .setgrid{display:grid;grid-template-columns:26px 1fr 1fr 1fr 28px;gap:6px;align-items:center;font-family:var(--mono)}
  .setgrid .hd{font-size:9px;color:var(--sub)}
  .setgrid input{padding:8px;font-family:var(--mono)}
  .setgrid .xbtn{background:none;border:none;color:var(--sub);font-size:16px;cursor:pointer}
  .pick{display:block;width:100%;text-align:left;padding:10px 8px;background:none;border:none;border-bottom:1px solid var(--grid);font-size:15px;color:var(--ink);cursor:pointer}
  .pick.new{background:var(--pushSoft);border:none;border-radius:8px;margin-top:6px;font-weight:700;color:var(--push)}
  .del{background:none;border:none;color:var(--danger);font-size:12px;font-family:var(--mono);cursor:pointer}
  .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;vertical-align:middle}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;z-index:50;white-space:nowrap}
  .toast.bad{background:var(--danger)}
  .muted{color:var(--sub);font-size:14px;text-align:center}
  .note{font-family:var(--mono);font-size:11px;color:var(--sub);text-align:center;margin-top:4px}
  svg text{font-family:var(--mono)}
</style>
</head>
<body>
<header>
  <h1>TRAINING LOG</h1>
  <div class="legend">
    <span><b style="color:var(--push)">●</b> push</span>
    <span><b style="color:var(--pull)">●</b> pull</span>
    <span><b style="color:var(--legs)">●</b> legs</span>
    <span>🏃 cardio</span>
  </div>
</header>
<div id="view"></div>
<nav class="navbar" id="navbar"></nav>
<input type="file" id="gpxFile" accept=".gpx,application/gpx+xml" multiple style="display:none">
<input type="file" id="importFile" accept=".json,application/json" style="display:none">
<input type="file" id="csvFile" accept=".csv,text/csv" style="display:none">

<script>
"use strict";
// ================= data =================
const KEY = "ftrack-data-v2";
const EMPTY = { lifts:[], cardio:[], weights:[], nutrition:[], customExercises:[] };
const DEFAULT_EXERCISES = [
 "Bench Press","Incline Bench Press","Decline Bench Press","Dumbbell Bench Press",
 "Overhead Press","Dumbbell Shoulder Press","Lateral Raise","Face Pull",
 "Lat Pulldown","Pull-Up","Barbell Row","Dumbbell Row","Seated Cable Row",
 "Squat","Front Squat","Leg Press","Hack Squat","Bulgarian Split Squat",
 "Deadlift","Romanian Deadlift","Hip Thrust","Leg Extension","Leg Curl","Calf Raise",
 "Dumbbell Curl","Barbell Curl","Hammer Curl","Preacher Curl",
 "Tricep Pushdown","Skull Crusher","Overhead Tricep Extension","Dips",
 "Chest Fly","Cable Crossover","Shrug","Ab Wheel","Cable Crunch"
];
const SPLITS = { push:{name:"Push",color:"var(--push)"}, pull:{name:"Pull",color:"var(--pull)"}, legs:{name:"Legs",color:"var(--legs)"} };

let data;
try { data = JSON.parse(localStorage.getItem(KEY)) || structuredClone(EMPTY); }
catch(e){ data = structuredClone(EMPTY); }
for (const k of Object.keys(EMPTY)) if (!Array.isArray(data[k])) data[k] = [];
if (typeof data.settings !== "object" || !data.settings) data.settings = { kcalTarget:null, proteinTarget:null };

function save(){
  try { localStorage.setItem(KEY, JSON.stringify(data)); }
  catch(e){ toast("Couldn't save — storage full?", true); }
}

// ================= helpers =================
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const pad = n => String(n).padStart(2,"0");
const todayISO = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const isoFromDate = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const prettyDate = iso => { const [y,m,d]=iso.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric",year:"numeric"}); };
const shortDate = iso => { const [,m,d]=iso.split("-").map(Number); return `${m}/${d}`; };
const epley = (w,r) => r<=1 ? w : w*(1+r/30);
const fmtDur = sec => { if(sec==null) return "—"; const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=Math.round(sec%60); return h>0?`${h}:${pad(m)}:${pad(s)}`:`${m}:${pad(s)}`; };
const fmtPace = spm => { if(!spm||!isFinite(spm)) return "—"; const m=Math.floor(spm/60),s=Math.round(spm%60); return `${m}:${pad(s)}/mi`; };
const paceOf = c => c.durationSec && c.distanceMi ? c.durationSec/c.distanceMi : null;

function toast(msg, bad){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const el = document.createElement("div");
  el.className = "toast" + (bad?" bad":"");
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2500);
}

function haversineMeters(a,b){
  const R=6371000, rad=x=>x*Math.PI/180;
  const dLat=rad(b.lat-a.lat), dLon=rad(b.lon-a.lon);
  const s=Math.sin(dLat/2)**2 + Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function parseGPX(text){
  const doc = new DOMParser().parseFromString(text,"application/xml");
  if (doc.querySelector("parsererror")) throw new Error("Not a valid GPX file");
  const trkpts = Array.from(doc.getElementsByTagName("trkpt"));
  if (trkpts.length < 2) throw new Error("No track points found");
  const pts = trkpts.map(p=>({
    lat:+p.getAttribute("lat"), lon:+p.getAttribute("lon"),
    ele:p.getElementsByTagName("ele")[0]?parseFloat(p.getElementsByTagName("ele")[0].textContent):null,
    t:p.getElementsByTagName("time")[0]?new Date(p.getElementsByTagName("time")[0].textContent):null
  }));
  let meters=0, gainM=0;
  for (let i=1;i<pts.length;i++){
    meters += haversineMeters(pts[i-1],pts[i]);
    if (pts[i].ele!=null && pts[i-1].ele!=null){ const d=pts[i].ele-pts[i-1].ele; if(d>0) gainM+=d; }
  }
  const t0 = pts.find(p=>p.t)?.t, t1 = [...pts].reverse().find(p=>p.t)?.t;
  const durationSec = (t0&&t1) ? Math.max(0,(t1-t0)/1000) : null;
  const typeText = (doc.getElementsByTagName("type")[0]?.textContent||"").toLowerCase();
  const distanceMi = meters/1609.344;
  const pace = durationSec && distanceMi>0 ? durationSec/distanceMi : null;
  let actType = "run";
  if (typeText.includes("walk")||typeText.includes("hik")) actType="walk";
  else if (typeText.includes("run")) actType="run";
  else if (pace && pace > 16*60) actType="walk";
  return {
    name: doc.getElementsByTagName("name")[0]?.textContent.trim() || "Imported activity",
    date: t0 ? isoFromDate(t0) : todayISO(),
    type: actType,
    distanceMi: Math.round(distanceMi*100)/100,
    durationSec: durationSec ? Math.round(durationSec) : null,
    elevGainFt: Math.round(gainM*3.28084)
  };
}

// simple hand-rolled SVG line chart
function lineChart(rows, color, opts={}){
  // rows: [{label, value}], opts: {invert, fmt}
  const vals = rows.map(r=>r.value).filter(v=>v!=null);
  if (vals.length < 2) return `<div class="muted" style="padding:20px">${esc(opts.emptyMsg||"Need at least two data points to draw a trend.")}</div>`;
  const W=520, H=250, padL=44, padR=14, padT=14, padB=26;
  let min=Math.min(...vals), max=Math.max(...vals);
  if (opts.refLine!=null){ min=Math.min(min,opts.refLine); max=Math.max(max,opts.refLine); }
  if (min===max){ min-=1; max+=1; }
  const span=max-min, m=span*0.08; min-=m; max+=m;
  const iw=W-padL-padR, ih=H-padT-padB;
  const x=i => padL + (rows.length===1?iw/2:i/(rows.length-1)*iw);
  const y=v => opts.invert ? padT + (v-min)/(max-min)*ih : padT + (1-(v-min)/(max-min))*ih;
  const fmt = opts.fmt || (v=>Math.round(v*10)/10);
  // gridlines
  let g="";
  for (let k=0;k<=4;k++){
    const v=min+(max-min)*k/4, yy=y(v);
    g += `<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#E3E9F0" stroke-dasharray="3 3"/>`;
    g += `<text x="${padL-6}" y="${yy+3}" font-size="10" fill="#66738A" text-anchor="end">${fmt(v)}</text>`;
  }
  // x labels: up to 6 evenly spaced
  const step = Math.max(1, Math.ceil(rows.length/6));
  rows.forEach((r,i)=>{ if(i%step===0||i===rows.length-1) g += `<text x="${x(i)}" y="${H-8}" font-size="10" fill="#66738A" text-anchor="middle">${esc(r.label)}</text>`; });
  // target reference line
  if (opts.refLine!=null){
    const ry=y(opts.refLine);
    g += `<line x1="${padL}" y1="${ry}" x2="${W-padR}" y2="${ry}" stroke="#66738A" stroke-width="1.5" stroke-dasharray="6 4"/>`;
    g += `<text x="${W-padR}" y="${ry-5}" font-size="10" fill="#66738A" text-anchor="end">target ${fmt(opts.refLine)}</text>`;
  }
  // line + dots
  const ptsAttr = rows.map((r,i)=> r.value==null?null:`${x(i)},${y(r.value)}`).filter(Boolean).join(" ");
  let dots="";
  rows.forEach((r,i)=>{ if(r.value!=null) dots += `<circle cx="${x(i)}" cy="${y(r.value)}" r="3.5" fill="${color}"><title>${esc(r.label)}: ${fmt(r.value)}</title></circle>`; });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    ${g}<polyline points="${ptsAttr}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>${dots}</svg>`;
}

// ================= ui state =================
const now = new Date();
const ui = {
  tab: "calendar",
  ym: { y: now.getFullYear(), m: now.getMonth() },
  selected: todayISO(),
  draft: { date: todayISO(), split:"", exercises:[], notes:"" },
  pickerOpen: false, search: "",
  pending: [], manualOpen: false,
  progMode: "lift", progExercise: "", progMetric: "top",
  cardioType: "run", cardioMetric: "pace",
  foodMetric: "kcal", foodManualOpen: false,
};

// ================= views =================
function render(){
  renderNav();
  const v = { calendar:renderCalendar, lift:renderLift, cardio:renderCardio, food:renderFood, weight:renderWeight, progress:renderProgress }[ui.tab];
  $("#view").innerHTML = v();
  afterRender();
}
function renderNav(){
  const tabs = [["calendar","Cal","▦"],["lift","Lift","▮▮"],["cardio","Cardio","↝"],["food","Food","◑"],["weight","Weight","⚖"],["progress","Trends","⟋"]];
  $("#navbar").innerHTML = tabs.map(([id,l,ic]) =>
    `<button class="${ui.tab===id?"on":""}" onclick="App.tab('${id}')"><div class="ic">${ic}</div><div class="tl">${l}</div><div class="bar"></div></button>`).join("");
}

// ----- calendar -----
function byDate(){
  const map={};
  const ensure = d => map[d] || (map[d]={lifts:[],cardio:[],weights:[],nutrition:[]});
  data.lifts.forEach(w=>ensure(w.date).lifts.push(w));
  data.cardio.forEach(c=>ensure(c.date).cardio.push(c));
  data.weights.forEach(w=>ensure(w.date).weights.push(w));
  data.nutrition.forEach(n=>ensure(n.date).nutrition.push(n));
  return map;
}
function renderCalendar(){
  const map = byDate();
  let banner = "";
  const hasData = data.lifts.length + data.cardio.length + data.weights.length + data.nutrition.length > 0;
  if (hasData){
    const le = data.settings.lastExport;
    const daysSince = le ? Math.floor((new Date(todayISO()) - new Date(le)) / 86400000) : null;
    if (le == null || daysSince > 30){
      banner = `<div class="card" style="background:#FFF8E6;border-color:#E0C878;display:flex;justify-content:space-between;align-items:center;gap:10px">
        <div style="font-size:13px;line-height:1.4"><b>Back up your log.</b> ${le?`Last export was ${daysSince} days ago.`:"You haven't exported a backup yet."}</div>
        <button onclick="App.exportData()" style="padding:8px 14px;font-size:13px;font-weight:700;background:var(--ink);color:#fff;border:none;border-radius:8px;cursor:pointer;white-space:nowrap">Export</button>
      </div>`;
    }
  }
  const {y,m} = ui.ym;
  const first = new Date(y,m,1), startDow = first.getDay(), dim = new Date(y,m+1,0).getDate();
  const monthName = first.toLocaleDateString(undefined,{month:"long",year:"numeric"}).toUpperCase();
  let cells = "";
  for (let i=0;i<startDow;i++) cells += "<div></div>";
  for (let d=1; d<=dim; d++){
    const iso = `${y}-${pad(m+1)}-${pad(d)}`;
    const has = map[iso];
    let marks = "";
    if (has){
      const splits = [...new Set(has.lifts.map(w=>w.split).filter(Boolean))];
      splits.forEach(s=> marks += `<span class="dot" style="background:${SPLITS[s].color}"></span>`);
      if (has.lifts.some(w=>!w.split)) marks += `<span class="dot" style="background:#9AA4B5"></span>`;
      if (has.cardio.length) marks += `<span class="runner">🏃</span>`;
    }
    cells += `<button class="day ${has?"has":""} ${iso===ui.selected?"sel":""} ${iso===todayISO()?"today":""}" onclick="App.selDay('${iso}')">
      <span class="num">${d}</span><span class="marks">${marks}</span></button>`;
  }
  const sel = map[ui.selected];
  let detail = "";
  if (!sel) detail = `<div class="card muted">Rest day — nothing logged. Use the Lift or Cardio tab to add a workout.</div>`;
  else {
    (sel.lifts||[]).forEach(w=>{
      const sp = w.split ? SPLITS[w.split] : null;
      detail += `<div class="card" style="border-left:4px solid ${sp?sp.color:"#9AA4B5"}">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div class="h2" style="margin:0">${sp?sp.name.toUpperCase()+" DAY":"LIFTING SESSION"}</div>
          <button class="del" onclick="App.delLift('${w.id}')">delete</button>
        </div>
        ${w.exercises.map(ex=>`<div style="margin-top:10px"><div style="font-weight:700;font-size:14px">${esc(ex.name)}</div>
          ${ex.sets.map(s=>`<div style="font-family:var(--mono);font-size:13px;padding:2px 0 0 10px">${s.weight} lb × ${s.reps}${s.rpe?`<span style="color:var(--sub)"> @ RPE ${s.rpe}</span>`:""}</div>`).join("")}
        </div>`).join("")}
        ${w.notes?`<div style="margin-top:10px;font-size:13px;color:var(--sub);font-style:italic">${esc(w.notes)}</div>`:""}
      </div>`;
    });
    (sel.cardio||[]).forEach(c=>{
      detail += `<div class="card" style="border-left:4px solid var(--cardio)">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div class="h2" style="margin:0">🏃 ${c.type==="walk"?"WALK":"RUN"}</div>
          <button class="del" onclick="App.delCardio('${c.id}')">delete</button>
        </div>
        <div style="font-size:13px;color:var(--sub);margin-bottom:8px">${esc(c.name)}</div>
        <div class="stats">
          ${stat("dist", c.distanceMi+" mi")}${stat("time", fmtDur(c.durationSec))}${stat("pace", fmtPace(paceOf(c)))}
          ${c.elevGainFt!=null?stat("gain", c.elevGainFt+" ft"):""}
        </div></div>`;
    });
    (sel.weights||[]).forEach(w=>{
      detail += `<div class="card" style="border-left:4px solid var(--ink);display:flex;justify-content:space-between;align-items:center">
        <div><div class="h2" style="margin:0">BODYWEIGHT</div><div style="font-family:var(--mono);font-size:15px;font-weight:600">${w.lbs} lb</div></div>
        <button class="del" onclick="App.delWeight('${w.id}')">delete</button></div>`;
    });
    (sel.nutrition||[]).forEach(n=>{
      detail += `<div class="card" style="border-left:4px solid var(--pull)">
        <div class="h2" style="margin:0 0 6px">NUTRITION</div>
        <div class="stats">
          <div class="stat"><div class="k">kcal</div><div class="v" style="color:${kcalColor(n.kcal)}">${n.kcal}</div></div>
          ${stat("protein", n.protein+"g")}${stat("carbs", n.carbs+"g")}${stat("fat", n.fat+"g")}
          ${n.fiber?stat("fiber", n.fiber+"g"):""}
        </div>
        ${data.settings.kcalTarget?`<div style="font-size:12px;margin-top:8px">vs ${data.settings.kcalTarget} kcal goal: ${kcalDelta(n.kcal)}</div>`:""}
        </div>`;
    });
  }
  return `${banner}<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <button onclick="App.month(-1)" style="background:none;border:none;font-size:22px;cursor:pointer;padding:0 10px">‹</button>
        <div class="h2" style="margin:0">${monthName}</div>
        <button onclick="App.month(1)" style="background:none;border:none;font-size:22px;cursor:pointer;padding:0 10px">›</button>

// deficit/surplus vs saved calorie goal: green under, red over
function kcalColor(kcal){
  const t = data.settings.kcalTarget;
  if (!t) return "var(--ink)";
  return kcal <= t ? "#2B8A3E" : "var(--danger)";
}
function kcalDelta(kcal){
  const t = data.settings.kcalTarget;
  if (!t) return "";
  const d = Math.round(kcal - t);
  if (d <= 0) return `<span style="color:#2B8A3E;font-family:var(--mono)">${d===0?"at goal":`−${Math.abs(d)} deficit`}</span>`;
  return `<span style="color:var(--danger);font-family:var(--mono)">+${d} surplus</span>`;
}
function parseCSV(text){
  // minimal RFC4180-ish parser: handles quoted fields with commas/newlines
  const rows=[]; let row=[], field="", inQ=false;
  for (let i=0;i<text.length;i++){
    const ch=text[i];
    if (inQ){
      if (ch==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; }
      else field+=ch;
    } else {
      if (ch==='"') inQ=true;
      else if (ch===","){ row.push(field); field=""; }
      else if (ch==="\n"||ch==="\r"){
        if (ch==="\r"&&text[i+1]==="\n") i++;
        row.push(field); field="";
        if (row.length>1||row[0]!=="") rows.push(row);
        row=[];
      }
      else field+=ch;
    }
  }
  if (field!==""||row.length){ row.push(field); rows.push(row); }
  return rows;
}
function parseCronometerCSV(text){
  const rows = parseCSV(text);
  if (rows.length < 2) throw new Error("File looks empty");
  const hdr = rows[0].map(h=>h.trim().toLowerCase());
  const findCol = (...needles) => hdr.findIndex(h=>needles.some(n=>h.startsWith(n)));
  const cDate = findCol("date");
  const cKcal = findCol("energy");
  const cProt = findCol("protein");
  const cCarb = findCol("carbs","carbohydrate");
  const cFat  = hdr.findIndex(h=>h==="fat (g)"||h==="fat"||h.startsWith("fat ("));
  const cFib  = findCol("fiber","fibre");
  if (cDate<0 || cKcal<0) throw new Error("Doesn't look like a Cronometer Daily Nutrition export");
  const hasGroup = findCol("group","diary group","day part") >= 0;
  const byD = {};
  for (let i=1;i<rows.length;i++){
    const r = rows[i];
    const rawDate = (r[cDate]||"").trim();
    if (!rawDate) continue;
    // Cronometer dates are YYYY-MM-DD; tolerate M/D/YYYY too
    let iso = rawDate;
    if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(rawDate)){
      const [m,d,y]=rawDate.split("/").map(Number); iso=`${y}-${pad(m)}-${pad(d)}`;
    }
    if (!/^\d{4}-\d{2}-\d{2}$/.test(iso)) continue;
    const num = c => { const v=parseFloat(r[c]); return isFinite(v)?v:0; };
    const e = { kcal:num(cKcal), protein:cProt>=0?num(cProt):0, carbs:cCarb>=0?num(cCarb):0, fat:cFat>=0?num(cFat):0, fiber:cFib>=0?num(cFib):0 };
    if (byD[iso] && hasGroup){ // per-meal rows: sum them
      for (const k of Object.keys(e)) byD[iso][k]+=e[k];
    } else byD[iso]=e; // daily totals: one row per date (last wins)
  }
  return Object.entries(byD).map(([date,e])=>({
    date, kcal:Math.round(e.kcal), protein:Math.round(e.protein), carbs:Math.round(e.carbs), fat:Math.round(e.fat), fiber:Math.round(e.fiber)
  }));
}

function renderProgress(){
  let html = `<div class="seg">
    <button class="${ui.progMode==="lift"?"on":""}" onclick="App.progMode('lift')">Lifting</button>
    <button class="${ui.progMode==="cardio"?"on":""}" onclick="App.progMode('cardio')">Run / Walk</button>
  </div>`;
  if (ui.progMode==="lift"){
    const logged = [...new Set(data.lifts.flatMap(w=>w.exercises.map(e=>e.name)))].sort();
    if (!logged.length) return html + `<div class="card muted">No lifts logged yet. Log a session in the Lift tab and your progress charts will build here.</div>`;
    if (!logged.includes(ui.progExercise)) ui.progExercise = logged[0];
    const rows = [];
    [...data.lifts].sort((a,b)=>a.date<b.date?-1:1).forEach(w=>{
      const ex = w.exercises.find(e=>e.name===ui.progExercise);
      if (!ex || !ex.sets.length) return;
      const top = Math.max(...ex.sets.map(s=>s.weight));
      const best = ex.sets.reduce((a,b)=> epley(b.weight,b.reps)>epley(a.weight,a.reps)?b:a);
      rows.push({
        label: shortDate(w.date),
        top, reps: Math.max(...ex.sets.filter(s=>s.weight===top).map(s=>s.reps)),
        e1rm: Math.round(epley(best.weight,best.reps)),
        volume: ex.sets.reduce((s,x)=>s+x.weight*x.reps,0)
      });
    });
    const last = rows[rows.length-1];
    html += `<div class="card"><div class="lbl">Movement</div>
      <select onchange="App.progExercise(this.value)">${logged.map(e=>`<option ${e===ui.progExercise?"selected":""}>${esc(e)}</option>`).join("")}</select></div>`;
    if (last) html += `<div class="card stats" style="border-left:4px solid var(--push)">
      ${stat("last top set", last.top+"×"+last.reps)}
      ${stat("best est 1RM", Math.max(...rows.map(r=>r.e1rm))+" lb")}
      ${stat("sessions", rows.length)}</div>`;
    html += `<div class="seg">
      <button class="${ui.progMetric==="top"?"on":""}" onclick="App.progMetric('top')">Top weight</button>
      <button class="${ui.progMetric==="e1rm"?"on":""}" onclick="App.progMetric('e1rm')">Est. 1RM</button>
      <button class="${ui.progMetric==="volume"?"on":""}" onclick="App.progMetric('volume')">Volume</button>
    </div>`;
    html += `<div class="card">${lineChart(rows.map(r=>({label:r.label, value:r[ui.progMetric]})), "#E8590C",
      {emptyMsg:`Log ${ui.progExercise} at least twice to draw a trend line.`, fmt:v=>Math.round(v)})}</div>`;
  } else {
    html += `<div class="seg">
      <button class="${ui.cardioType==="run"?"on":""}" onclick="App.cardioType('run')">Runs</button>
      <button class="${ui.cardioType==="walk"?"on":""}" onclick="App.cardioType('walk')">Walks</button></div>
    <div class="seg">
      <button class="${ui.cardioMetric==="pace"?"on":""}" onclick="App.cardioMetric('pace')">Pace</button>
      <button class="${ui.cardioMetric==="distance"?"on":""}" onclick="App.cardioMetric('distance')">Distance</button></div>`;
    const rows = data.cardio.filter(c=>c.type===ui.cardioType && c.distanceMi>0)
      .sort((a,b)=>a.date<b.date?-1:1)
      .map(c=>({label:shortDate(c.date), value: ui.cardioMetric==="pace" ? (paceOf(c)?paceOf(c)/60:null) : c.distanceMi}));
    const fmt = ui.cardioMetric==="pace" ? (v=>`${Math.floor(v)}:${pad(Math.round(v%1*60))}`) : (v=>Math.round(v*10)/10);
    html += `<div class="card">${lineChart(rows, "#1971C2",
      {invert: ui.cardioMetric==="pace", fmt, emptyMsg:`Import at least two ${ui.cardioType}s to draw a trend line.`})}</div>`;
    if (ui.cardioMetric==="pace" && rows.filter(r=>r.value!=null).length>=2)
      html += `<div class="note">axis is flipped — a line moving up means you're getting faster</div>`;
  }
  // backup
  html += `<div class="h2" style="margin-top:18px">Data backup</div>
    <div class="card">
      <div style="font-size:13px;color:var(--sub);margin-bottom:10px;line-height:1.45">
        Your log lives in this browser's storage. Export a backup now and then — especially before clearing Safari data.</div>
      <button class="btn ink" onclick="App.exportData()">Export backup (.json)</button>
      <button class="btn" style="background:transparent;border:1px solid var(--ink);color:var(--ink);margin-top:8px" onclick="document.getElementById('importFile').click()">Restore from backup</button>
    </div>`;
  return html;
}

function afterRender(){
  const s = $("#exSearch");
  if (s && ui.focusSearch){ s.focus(); s.setSelectionRange(s.value.length, s.value.length); ui.focusSearch=false; }
}

// ================= actions =================
window.App = {
  tab(t){ ui.tab=t; render(); },
  month(dir){ let {y,m}=ui.ym; m+=dir; if(m<0){m=11;y--;} if(m>11){m=0;y++;} ui.ym={y,m}; render(); },
  selDay(iso){ ui.selected=iso; render(); },

  // lift
  draftDate(v){ ui.draft.date=v; },
  draftNotes(v){ ui.draft.notes=v; },
  setSplit(s){ ui.draft.split = ui.draft.split===s ? "" : s; render(); },
  openPicker(){ ui.pickerOpen=true; ui.search=""; ui.focusSearch=true; render(); },
  closePicker(){ ui.pickerOpen=false; ui.search=""; render(); },
  searchEx(v){ ui.search=v; $("#exMatches").innerHTML = matchesHTML(); },
  addExercise(name){ ui.draft.exercises.push({name, sets:[{w:"",r:"",rpe:""}]}); ui.pickerOpen=false; ui.search=""; render(); },
  addCustom(){
    const name = ui.search.trim(); if(!name) return;
    data.customExercises.push(name); save();
    App.addExercise(name);
  },
  setField(ei,si,f,v){ ui.draft.exercises[ei].sets[si][f]=v; },
  addSet(ei){ const sets=ui.draft.exercises[ei].sets; sets.push({...sets[sets.length-1]}); render(); },
  rmSet(ei,si){
    ui.draft.exercises[ei].sets.splice(si,1);
    if (!ui.draft.exercises[ei].sets.length) ui.draft.exercises.splice(ei,1);
    render();
  },
  rmExercise(ei){ ui.draft.exercises.splice(ei,1); render(); },
  saveLift(){
    const d = ui.draft;
    const cleaned = d.exercises.map(ex=>({
      name: ex.name,
      sets: ex.sets.filter(s=>s.w!==""&&s.r!=="").map(s=>({weight:+s.w, reps:+s.r, rpe:s.rpe===""?null:+s.rpe}))
    })).filter(ex=>ex.sets.length);
    if (!cleaned.length){ toast("Add at least one set with weight and reps", true); return; }
    data.lifts.push({id:uid(), date:d.date, split:d.split||null, exercises:cleaned, notes:d.notes.trim()});
    save();
    ui.draft = {date:todayISO(), split:"", exercises:[], notes:""};
    toast("Workout saved ✓"); render();
  },
  delLift(id){ if(!confirm("Delete this lifting session?"))return; data.lifts=data.lifts.filter(w=>w.id!==id); save(); toast("Session deleted"); render(); },

  // cardio
  toggleManual(){ ui.manualOpen=!ui.manualOpen; render(); },
  pend(i,f,v){ ui.pending[i][f]=v; },
  confirmPending(i){
    const p = ui.pending[i];
    data.cardio.push({id:uid(), date:p.date, type:p.type, name:p.name, distanceMi:p.distanceMi, durationSec:p.durationSec, elevGainFt:p.elevGainFt, source:"strava-gpx"});
    save(); ui.pending.splice(i,1); toast("Activity saved ✓"); render();
  },
  saveManual(){
    const dist = parseFloat($("#mDist").value);
    if (!dist || dist<=0){ toast("Enter a distance", true); return; }
    const dur = (+$("#mH").value||0)*3600 + (+$("#mM").value||0)*60 + (+$("#mS").value||0);
    data.cardio.push({id:uid(), date:$("#mDate").value, type:$("#mType").value, name:"Manual "+$("#mType").value, distanceMi:Math.round(dist*100)/100, durationSec:dur>0?dur:null, elevGainFt:null, source:"manual"});
    save(); ui.manualOpen=false; toast("Activity saved ✓"); render();
  },
  delCardio(id){ if(!confirm("Delete this activity?"))return; data.cardio=data.cardio.filter(c=>c.id!==id); save(); toast("Activity deleted"); render(); },

  // food
  toggleFoodManual(){ ui.foodManualOpen=!ui.foodManualOpen; render(); },
  foodMetric(m){ ui.foodMetric=m; render(); },
  saveFood(){
    const kcal = parseFloat($("#fKcal").value);
    if (!kcal || kcal<=0){ toast("Enter calories", true); return; }
    const date = $("#fDate").value;
    const n = f => { const v=parseFloat($(f).value); return isFinite(v)?Math.round(v):0; };
    data.nutrition = data.nutrition.filter(d=>d.date!==date);
    data.nutrition.push({id:uid(), date, kcal:Math.round(kcal), protein:n("#fProt"), carbs:n("#fCarb"), fat:n("#fFat"), fiber:0, source:"manual"});
    save(); ui.foodManualOpen=false; toast("Day saved ✓"); render();
  },
  saveTargets(){
    const k = parseFloat($("#tKcal").value), p = parseFloat($("#tProt").value);
    data.settings.kcalTarget = isFinite(k)&&k>0 ? Math.round(k) : null;
    data.settings.proteinTarget = isFinite(p)&&p>0 ? Math.round(p) : null;
    save(); toast("Targets saved ✓"); render();
  },
  delFood(key){
    if(!confirm("Delete this day's nutrition?"))return;
    data.nutrition = data.nutrition.filter(d=>d.id!==key && d.date!==key);
    save(); toast("Day deleted"); render();
  },

  // weight
  saveWeight(){
    const lbs = parseFloat($("#wLbs").value);
    if (!lbs || lbs<=0){ toast("Enter your weight", true); return; }
    const date = $("#wDate").value;
    data.weights = data.weights.filter(w=>w.date!==date); // one entry per day
    data.weights.push({id:uid(), date, lbs:Math.round(lbs*10)/10});
    save(); toast("Weigh-in saved ✓"); render();
  },
  delWeight(id){ if(!confirm("Delete this weigh-in?"))return; data.weights=data.weights.filter(w=>w.id!==id); save(); toast("Weigh-in deleted"); render(); },

  // progress
  progMode(m){ ui.progMode=m; render(); },
  progExercise(e){ ui.progExercise=e; render(); },
  progMetric(m){ ui.progMetric=m; render(); },
  cardioType(t){ ui.cardioType=t; render(); },
  cardioMetric(m){ ui.cardioMetric=m; render(); },

  // backup
  exportData(){
    const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `training-log-backup-${todayISO()}.json`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    data.settings.lastExport = todayISO();
    save(); render();
  },
};

// gpx upload
$("#gpxFile").addEventListener("change", async e=>{
  const files = Array.from(e.target.files||[]);
  for (const f of files){
    try { ui.pending.push({...parseGPX(await f.text()), fileName:f.name}); }
    catch(err){ toast(`${f.name}: ${err.message}`, true); }
  }
  e.target.value = "";
  render();
});
// cronometer csv upload
$("#csvFile").addEventListener("change", async e=>{
  const f = e.target.files?.[0]; if(!f) return;
  try {
    const parsed = parseCronometerCSV(await f.text());
    if (!parsed.length) throw new Error("No daily rows found in file");
    const dates = new Set(parsed.map(p=>p.date));
    data.nutrition = data.nutrition.filter(d=>!dates.has(d.date));
    parsed.forEach(p=>data.nutrition.push({id:uid(), ...p, source:"cronometer"}));
    save();
    const ds = [...dates].sort();
    toast(`Imported ${parsed.length} day${parsed.length>1?"s":""} (${shortDate(ds[0])}–${shortDate(ds[ds.length-1])}) ✓`);
    render();
  } catch(err){ toast(err.message, true); }
  e.target.value = "";
});
// backup restore
$("#importFile").addEventListener("change", async e=>{
  const f = e.target.files?.[0]; if(!f) return;
  try {
    const parsed = JSON.parse(await f.text());
    if (!parsed || !Array.isArray(parsed.lifts)) throw new Error("bad format");
    if (!confirm("Replace your current log with this backup?")) { e.target.value=""; return; }
    data = { ...structuredClone(EMPTY), ...parsed };
    save(); toast("Backup restored ✓"); render();
  } catch(err){ toast("That file isn't a valid backup", true); }
  e.target.value = "";
});

render();
</script>
</body>
</html>
