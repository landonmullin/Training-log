<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F9FB">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<title>Training Log</title>
<style>
  :root{
    --paper:#F7F9FB; --grid:#E3E9F0; --ink:#182437; --sub:#66738A;
    --push:#E8590C; --pull:#2B8A3E; --legs:#7048E8; --cardio:#1971C2;
    --pushSoft:#FDEEE3; --cardioSoft:#E7F1FB;
    --card:#FFF; --line:#D8DFE8; --danger:#C92A2A;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --disp:'Arial Narrow','Helvetica Neue Condensed',-apple-system,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);padding-bottom:calc(84px + env(safe-area-inset-bottom))}
  header{padding:calc(14px + env(safe-area-inset-top)) 16px 10px;border-bottom:1px solid var(--grid);position:sticky;top:0;background:var(--paper);z-index:5}
  h1{font-family:var(--disp);font-size:28px;font-weight:700;letter-spacing:.01em;font-stretch:condensed}
  .legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .legend .chip{display:flex;align-items:center;gap:7px;font-family:var(--body);font-size:13px;font-weight:600;color:var(--ink);padding:7px 12px;border:1px solid var(--line);border-radius:20px;background:var(--card)}
  .legend .sw{width:16px;height:16px;border-radius:5px;border:1px solid rgba(0,0,0,0.08)}
  #view{padding:14px;max-width:560px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
  .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--sub);text-transform:uppercase;margin-bottom:4px}
  input,select,textarea{width:100%;padding:10px 12px;font-size:16px;font-family:var(--body);border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);outline:none;-webkit-appearance:none;appearance:none}
  textarea{min-height:90px;font-family:var(--mono);font-size:13px;resize:vertical}
  input.mono{font-family:var(--mono)}
  .btn{display:block;width:100%;padding:12px 16px;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-family:var(--body)}
  .btn.ink{background:var(--ink);color:#fff}
  .btn.push{background:var(--push);color:#fff}
  .btn.cardio{background:var(--cardio);color:#fff}
  .btn.ghost{background:transparent;border:1px solid var(--cardio);color:var(--cardio)}
  .btn.soft{background:var(--pushSoft);color:var(--push);padding:9px}
  .seg{display:flex;gap:8px;margin-bottom:12px}
  .seg button{flex:1;padding:9px 4px;font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--sub)}
  .seg button.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .seg button.on.p{background:var(--push);border-color:var(--push)}
  .seg button.on.pl{background:var(--pull);border-color:var(--pull)}
  .seg button.on.l{background:var(--legs);border-color:var(--legs)}
  .h2{font-family:var(--disp);font-weight:700;font-size:18px;margin:6px 2px 8px;text-transform:uppercase;font-stretch:condensed}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal .dow{text-align:center;font-family:var(--mono);font-size:10px;color:var(--sub);padding:2px 0}
  .cal .day{aspect-ratio:1;border:1px solid var(--grid);border-radius:8px;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;padding:0}
  .cal .day.has{background:#fff}
  .cal .day.sel{border:2px solid var(--ink)}
  .cal .day.today .num{font-weight:700;text-decoration:underline}
  .cal .num{font-family:var(--mono);font-size:12px;color:var(--ink)}
  .cal .marks{height:12px;display:flex;align-items:center;gap:1px}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .runner{font-size:10px;line-height:1}
  .navbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:10;padding-bottom:env(safe-area-inset-bottom)}
  .navbar button{flex:1;padding:9px 0 10px;background:none;border:none;color:var(--sub);cursor:pointer;font-family:var(--body)}
  .navbar button.on{color:var(--ink)}
  .navbar .ic{line-height:1;height:22px}
  .navbar .ic svg{width:22px;height:22px;display:block;margin:0 auto;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .navbar .tl{font-size:10px;margin-top:3px}
  .navbar button.on .tl{font-weight:700}
  .navbar .bar{height:3px;width:24px;margin:4px auto 0;border-radius:2px;background:transparent}
  .navbar button.on .bar{background:var(--ink)}
  .stat .k{font-size:9px;letter-spacing:.12em;color:var(--sub);text-transform:uppercase;font-family:var(--mono)}
  .stat .v{font-size:15px;font-weight:600;font-family:var(--mono)}
  .stats{display:flex;gap:18px}
  .setgrid{display:grid;grid-template-columns:26px 1fr 1fr 1fr 28px;gap:6px;align-items:center;font-family:var(--mono)}
  .setgrid .hd{font-size:9px;color:var(--sub)}
  .setgrid input{padding:8px;font-family:var(--mono)}
  .setgrid .xbtn{background:none;border:none;color:var(--sub);font-size:16px;cursor:pointer}
  .pick{display:block;width:100%;text-align:left;padding:10px 8px;background:none;border:none;border-bottom:1px solid var(--grid);font-size:15px;color:var(--ink);cursor:pointer}
  .pick.new{background:var(--pushSoft);border:none;border-radius:8px;margin-top:6px;font-weight:700;color:var(--push)}
  .del{background:none;border:none;color:var(--danger);font-size:12px;font-family:var(--mono);cursor:pointer}
  .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;vertical-align:middle}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;z-index:50;white-space:nowrap}
  .toast.bad{background:var(--danger)}
  .muted{color:var(--sub);font-size:14px;text-align:center}
  .note{font-family:var(--mono);font-size:11px;color:var(--sub);text-align:center;margin-top:4px}
  .weblink{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;text-decoration:none;color:var(--cardio);margin-top:10px}
  .weblink.pull{color:var(--pull)}
  .weblink .ext{font-size:11px;opacity:.7}
  svg text{font-family:var(--mono)}
  .hdrbtn{position:relative;background:var(--card);border:1px solid var(--line);border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink)}
  .hdrbtn.on{background:var(--ink);color:var(--card);border-color:var(--ink)}
  .hdrbtn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .hdrbtn .badge{position:absolute;top:-6px;right:-7px;background:var(--push);color:#fff;border-radius:9px;font-size:10px;font-weight:700;padding:1px 5px;font-family:var(--mono)}
  .todo-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;transition:transform .45s ease,opacity .45s ease}
  .todo-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);background:var(--card);flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;padding:0;transition:background .2s,border-color .2s}
  .todo-row.done-anim .todo-check{background:#2B8A3E;border-color:#2B8A3E;animation:pop .35s ease}
  .todo-row.done-anim{transform:translateX(60px);opacity:0}
  .todo-row.completed .todo-check{background:#2B8A3E;border-color:#2B8A3E}
  .todo-row.completed .todo-text{color:var(--sub);text-decoration:line-through}
  .todo-text{flex:1;font-size:15px;color:var(--ink)}
  .todo-x{background:none;border:none;color:var(--sub);font-size:16px;cursor:pointer;padding:2px 6px}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
  .switch{width:48px;height:28px;border-radius:14px;background:var(--line);border:none;position:relative;cursor:pointer;transition:background .2s;flex:none;padding:0}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .switch.on{background:#2B8A3E}
  .switch.on::after{transform:translateX(20px)}
  .setrow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--grid)}
  .setrow:last-child{border-bottom:none}
  .setrow .t{font-size:15px;font-weight:600;color:var(--ink)}
  .setrow .d{font-size:12px;color:var(--sub);margin-top:2px}
  body.dark{--paper:#12171F;--grid:#232B38;--ink:#E9EDF3;--sub:#8E99AC;--card:#1B2330;--line:#2C3646;--pushSoft:rgba(232,89,12,0.22);--cardioSoft:rgba(25,113,194,0.22)}
  body.dark .btn.ink{color:#12171F}
  body.dark .seg button.on{color:#12171F}
  body.dark .toast{color:#12171F}
  body.dark .toast.bad{color:#fff}
  .routemap{height:220px;border-radius:10px;overflow:hidden;margin-top:10px;border:1px solid var(--line);background:var(--paper)}
  .routebtn{background:none;border:none;color:var(--cardio);font-size:13px;font-weight:700;cursor:pointer;padding:6px 0 0;font-family:var(--body)}
  body.dark .leaflet-tile{filter:invert(1) hue-rotate(180deg) brightness(0.9) contrast(0.9) saturate(0.7)}
  body.dark .leaflet-container{background:#1B2330}
</style>
</head>
<body>
<header>
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h1>TRAINING LOG</h1>
    <div style="display:flex;gap:8px">
      <button id="todoBtn" class="hdrbtn" onclick="App.tab('todo')" aria-label="To-do list"></button>
      <button id="settingsBtn" class="hdrbtn" onclick="App.tab('settings')" aria-label="Settings"></button>
    </div>
  </div>
</header>
<div id="view"></div>
<nav class="navbar" id="navbar"></nav>
<input type="file" id="gpxFile" multiple style="display:none">
<input type="file" id="importFile" accept=".json,application/json" style="display:none">
<input type="file" id="csvFile" style="display:none">

<script>
"use strict";
// ================= data =================
const KEY = "ftrack-data-v2";
const EMPTY = { lifts:[], cardio:[], weights:[], nutrition:[], todos:[], customExercises:[] };
const TYPE_META = {
  run:{label:"Run",emoji:"🏃"},
  walk:{label:"Walk",emoji:"🚶"},
  treadmill:{label:"Treadmill",emoji:"👟"},
  cycling:{label:"Cycling",emoji:"🚴"},
  stairmaster:{label:"Stairmaster",emoji:"🪜"},
  basketball:{label:"Basketball",emoji:"🏀"},
  volleyball:{label:"Volleyball",emoji:"🏐"},
};
const tmeta = t => TYPE_META[t] || TYPE_META.run;
const DEFAULT_EXERCISES = [
 "Bench Press","Incline Bench Press","Decline Bench Press","Dumbbell Bench Press",
 "Overhead Press","Dumbbell Shoulder Press","Lateral Raise","Face Pull",
 "Lat Pulldown","Pull-Up","Barbell Row","Dumbbell Row","Seated Cable Row",
 "Squat","Front Squat","Leg Press","Hack Squat","Bulgarian Split Squat",
 "Deadlift","Romanian Deadlift","Hip Thrust","Leg Extension","Leg Curl","Calf Raise",
 "Dumbbell Curl","Barbell Curl","Hammer Curl","Preacher Curl",
 "Tricep Pushdown","Skull Crusher","Overhead Tricep Extension","Dips",
 "Chest Fly","Cable Crossover","Shrug","Ab Wheel","Cable Crunch"
];
const SPLITS = {
  push:{name:"Push",color:"var(--push)",soft:"rgba(232,89,12,0.16)",dsoft:"rgba(232,89,12,0.30)"},
  pull:{name:"Pull",color:"var(--pull)",soft:"rgba(43,138,62,0.16)",dsoft:"rgba(63,178,92,0.30)"},
  legs:{name:"Legs",color:"var(--legs)",soft:"rgba(112,72,232,0.16)",dsoft:"rgba(140,110,245,0.32)"}
};
const UNTAGGED_SOFT = "rgba(102,115,138,0.14)";
const isDark = () => document.body.classList.contains("dark");
const softSplit = k => isDark() ? SPLITS[k].dsoft : SPLITS[k].soft;
const untaggedSoft = () => isDark() ? "rgba(140,150,168,0.24)" : UNTAGGED_SOFT;
const chartGrid = () => isDark() ? "#2C3646" : "#E3E9F0";
const chartLabel = () => isDark() ? "#8E99AC" : "#66738A";
const inkLine = () => isDark() ? "#E9EDF3" : "#182437";
function applyTheme(){
  document.body.classList.toggle("dark", !!data.settings.darkMode);
  const m = document.querySelector('meta[name="theme-color"]');
  if (m) m.content = data.settings.darkMode ? "#12171F" : "#F7F9FB";
}

let data;
try { data = JSON.parse(localStorage.getItem(KEY)) || structuredClone(EMPTY); }
catch(e){ data = structuredClone(EMPTY); }
for (const k of Object.keys(EMPTY)) if (!Array.isArray(data[k])) data[k] = [];
if (typeof data.settings !== "object" || !data.settings) data.settings = { kcalTarget:null, proteinTarget:null };
if (typeof data.settings.todoEnabled === "undefined") data.settings.todoEnabled = true;
if (!data.settings.cardioTypes) data.settings.cardioTypes = Object.fromEntries(Object.keys(TYPE_META).map(k=>[k,true]));
for (const k of Object.keys(TYPE_META)) if (typeof data.settings.cardioTypes[k]==="undefined") data.settings.cardioTypes[k]=true;

function save(){
  try { localStorage.setItem(KEY, JSON.stringify(data)); }
  catch(e){ toast("Couldn't save — storage full?", true); }
}

// ================= helpers =================
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const pad = n => String(n).padStart(2,"0");
const todayISO = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const isoFromDate = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const prettyDate = iso => { const [y,m,d]=iso.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric",year:"numeric"}); };
const shortDate = iso => { const [,m,d]=iso.split("-").map(Number); return `${m}/${d}`; };
const epley = (w,r) => r<=1 ? w : w*(1+r/30);
const fmtDur = sec => { if(sec==null) return "—"; const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=Math.round(sec%60); return h>0?`${h}:${pad(m)}:${pad(s)}`:`${m}:${pad(s)}`; };
const fmtPace = spm => { if(!spm||!isFinite(spm)) return "—"; const m=Math.floor(spm/60),s=Math.round(spm%60); return `${m}:${pad(s)}/mi`; };
const paceOf = c => c.durationSec && c.distanceMi ? c.durationSec/c.distanceMi : null;

function toast(msg, bad){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const el = document.createElement("div");
  el.className = "toast" + (bad?" bad":"");
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2500);
}

function haversineMeters(a,b){
  const R=6371000, rad=x=>x*Math.PI/180;
  const dLat=rad(b.lat-a.lat), dLon=rad(b.lon-a.lon);
  const s=Math.sin(dLat/2)**2 + Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function parseGPX(text){
  const doc = new DOMParser().parseFromString(text,"application/xml");
  if (doc.querySelector("parsererror")) throw new Error("Not a valid GPX file");
  const trkpts = Array.from(doc.getElementsByTagName("trkpt"));
  if (trkpts.length < 2) throw new Error("No track points found");
  const pts = trkpts.map(p=>{
    const hrEl = p.getElementsByTagNameNS("*","hr")[0];
    return {
      lat:+p.getAttribute("lat"), lon:+p.getAttribute("lon"),
      ele:p.getElementsByTagName("ele")[0]?parseFloat(p.getElementsByTagName("ele")[0].textContent):null,
      t:p.getElementsByTagName("time")[0]?new Date(p.getElementsByTagName("time")[0].textContent):null,
      hr:hrEl?parseInt(hrEl.textContent):null
    };
  });
  // smooth elevation (7-pt moving average) to stop GPS noise from inflating gain
  const eleSm = pts.map((p,i)=>{
    if (p.ele==null) return null;
    let s=0,n=0;
    for (let j=Math.max(0,i-3); j<=Math.min(pts.length-1,i+3); j++){
      if (pts[j].ele!=null){ s+=pts[j].ele; n++; }
    }
    return n? s/n : null;
  });
  let meters=0, gainM=0, movingSec=0;
  let hrTime=0, hrWeighted=0, hrMax=null; const hrHist={};
  let valley=null; // hysteresis for elevation gain: only count climbs of 2m+
  // real split times: elapsed seconds when cumulative distance first reaches each mark
  const SPLIT_MARKS = {mile:1609.344, fivek:5000, tenk:10000, half:21097.5, marathon:42195};
  const splits = {};
  const startT = pts.find(p=>p.t)?.t || null;
  for (let i=1;i<pts.length;i++){
    const prevMeters = meters;
    let seg = haversineMeters(pts[i-1],pts[i]);
    const dt = (pts[i].t && pts[i-1].t) ? (pts[i].t - pts[i-1].t)/1000 : null;
    // GPS teleport filter: ignore impossible jumps (>15 m/s for foot travel)
    if (dt!=null && dt>0 && seg/dt > 15) seg = 0;
    meters += seg;
    // moving time: count only segments where actually moving (>0.5 m/s), like Strava does
    const moving = dt!=null && dt>0 && dt<60 && seg/dt > 0.5;
    if (moving) movingSec += dt;
    if (startT && pts[i].t && pts[i-1].t){
      for (const [k,mk] of Object.entries(SPLIT_MARKS)){
        if (splits[k]==null && prevMeters < mk && meters >= mk && seg > 0){
          const frac = (mk - prevMeters) / seg;
          const tAt = pts[i-1].t.getTime() + frac * (pts[i].t.getTime() - pts[i-1].t.getTime());
          splits[k] = Math.round((tAt - startT.getTime())/1000);
        }
      }
    }
    // elevation gain with 2m hysteresis on the smoothed series
    if (eleSm[i]!=null){
      if (valley==null || eleSm[i] < valley) valley = Math.min(valley??eleSm[i], eleSm[i]);
      else if (eleSm[i] - valley >= 2){ gainM += eleSm[i]-valley; valley = eleSm[i]; }
    }
    const hr = pts[i].hr ?? pts[i-1].hr;
    if (hr && moving){
      hrTime += dt; hrWeighted += hr*dt;
      if (hrMax==null || hr>hrMax) hrMax = hr;
      const bin = Math.round(hr/5)*5;
      hrHist[bin] = (hrHist[bin]||0) + dt;
    }
  }
  // downsampled route for the map (~200 points, ~1m precision)
  const step = Math.max(1, Math.ceil(pts.length/200));
  const route = [];
  for (let i=0;i<pts.length;i+=step) route.push([+pts[i].lat.toFixed(5), +pts[i].lon.toFixed(5)]);
  const lastPt = pts[pts.length-1];
  const lastRp = [+lastPt.lat.toFixed(5), +lastPt.lon.toFixed(5)];
  if (route.length && (route[route.length-1][0]!==lastRp[0] || route[route.length-1][1]!==lastRp[1])) route.push(lastRp);
  const t0 = pts.find(p=>p.t)?.t, t1 = [...pts].reverse().find(p=>p.t)?.t;
  const elapsedSec = (t0&&t1) ? Math.max(0,(t1-t0)/1000) : null;
  const durationSec = movingSec > 0 ? movingSec : elapsedSec; // display moving time, like Strava
  const typeText = (doc.getElementsByTagName("type")[0]?.textContent||"").toLowerCase();
  const distanceMi = meters/1609.344;
  const pace = durationSec && distanceMi>0 ? durationSec/distanceMi : null;
  let actType = "run";
  if (typeText.includes("rid")||typeText.includes("cycl")||typeText.includes("bik")) actType="cycling";
  else if (typeText.includes("walk")||typeText.includes("hik")) actType="walk";
  else if (typeText.includes("run")) actType="run";
  else if (pace && pace > 16*60) actType="walk";
  return {
    name: doc.getElementsByTagName("name")[0]?.textContent.trim() || "Imported activity",
    date: t0 ? isoFromDate(t0) : todayISO(),
    type: actType,
    distanceMi: Math.round(distanceMi*100)/100,
    durationSec: durationSec ? Math.round(durationSec) : null,
    elevGainFt: Math.round(gainM*3.28084),
    avgHr: hrTime>0 ? Math.round(hrWeighted/hrTime) : null,
    maxHr: hrMax,
    hrHist: hrTime>0 ? Object.fromEntries(Object.entries(hrHist).map(([k,v])=>[k,Math.round(v)])) : null,
    splits: Object.keys(splits).length ? splits : null,
    route: route.length>1 ? route : null
  };
}

// heart-rate zones from the 5-bpm histogram and the user's max HR
// Z1 <60% · Z2 60–70% · Z3 70–80% · Z4 80–90% · Z5 90%+
const ZONE_COLORS = ["#74C0FC","#51CF66","#FFD43B","#FF922B","#FA5252"];
function zonesFromHist(hist, userMax){
  const z=[0,0,0,0,0];
  for (const [bpm,sec] of Object.entries(hist)){
    const pct = bpm/userMax;
    const zi = pct<0.6?0 : pct<0.7?1 : pct<0.8?2 : pct<0.9?3 : 4;
    z[zi]+=sec;
  }
  return z;
}
function zoneParts(hist){
  const m = data.settings.maxHr;
  if (!m) return null;
  const z = zonesFromHist(hist, m);
  const total = z.reduce((a,b)=>a+b,0);
  if (!total) return null;
  return z.map((s,i)=> s>0 ? {i, pct:Math.round(s/total*100)} : null).filter(Boolean);
}
function zoneInline(hist, size=12){
  const parts = zoneParts(hist);
  if (!parts) return "";
  return parts.map(p=>`<span style="color:${ZONE_COLORS[p.i]};font-weight:700;font-family:var(--mono);font-size:${size}px">${p.pct}% Z${p.i+1}</span>`).join(`<span style="color:var(--sub);font-size:${size}px"> · </span>`);
}
function zoneBar(hist){
  const m = data.settings.maxHr;
  if (!m) return `<div style="font-size:12px;color:var(--sub);margin-top:8px">Set your max HR under Weight → Other measurements to see zone breakdowns.</div>`;
  const parts = zoneParts(hist);
  if (!parts) return "";
  const z = zonesFromHist(hist, m);
  const total = z.reduce((a,b)=>a+b,0);
  const segs = z.map((s,i)=> s>0?`<div style="width:${(s/total*100).toFixed(1)}%;background:${ZONE_COLORS[i]}"></div>`:"").join("");
  return `<div style="margin-top:12px">
    <div style="display:flex;height:12px;border-radius:6px;overflow:hidden;margin-bottom:6px">${segs}</div>
    <div>${zoneInline(hist, 13)}</div>
  </div>`;
}

// simple hand-rolled SVG line chart
function lineChart(rows, color, opts={}){
  // rows: [{label, value}], opts: {invert, fmt}
  const vals = rows.map(r=>r.value).filter(v=>v!=null);
  if (vals.length < 2) return `<div class="muted" style="padding:20px">${esc(opts.emptyMsg||"Need at least two data points to draw a trend.")}</div>`;
  const W=520, H=250, padL=44, padR=14, padT=14, padB=26;
  let min=Math.min(...vals), max=Math.max(...vals);
  if (opts.refLine!=null){ min=Math.min(min,opts.refLine); max=Math.max(max,opts.refLine); }
  if (opts.overlay){ const ov=opts.overlay.values.filter(v=>v!=null); if(ov.length){ min=Math.min(min,...ov); max=Math.max(max,...ov); } }
  if (min===max){ min-=1; max+=1; }
  const span=max-min, m=span*0.08; min-=m; max+=m;
  const iw=W-padL-padR, ih=H-padT-padB;
  const x=i => padL + (rows.length===1?iw/2:i/(rows.length-1)*iw);
  const y=v => opts.invert ? padT + (v-min)/(max-min)*ih : padT + (1-(v-min)/(max-min))*ih;
  const fmt = opts.fmt || (v=>Math.round(v*10)/10);
  // gridlines
  let g="";
  for (let k=0;k<=4;k++){
    const v=min+(max-min)*k/4, yy=y(v);
    g += `<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="${chartGrid()}" stroke-dasharray="3 3"/>`;
    g += `<text x="${padL-6}" y="${yy+3}" font-size="10" fill="${chartLabel()}" text-anchor="end">${fmt(v)}</text>`;
  }
  // x labels: up to 6 evenly spaced
  const step = Math.max(1, Math.ceil(rows.length/6));
  rows.forEach((r,i)=>{ if(i%step===0||i===rows.length-1) g += `<text x="${x(i)}" y="${H-8}" font-size="10" fill="${chartLabel()}" text-anchor="middle">${esc(r.label)}</text>`; });
  // target reference line
  if (opts.refLine!=null){
    const ry=y(opts.refLine);
    g += `<line x1="${padL}" y1="${ry}" x2="${W-padR}" y2="${ry}" stroke="${chartLabel()}" stroke-width="1.5" stroke-dasharray="6 4"/>`;
    g += `<text x="${W-padR}" y="${ry-5}" font-size="10" fill="${chartLabel()}" text-anchor="end">target ${fmt(opts.refLine)}</text>`;
  }
  // line + dots
  const ptsAttr = rows.map((r,i)=> r.value==null?null:`${x(i)},${y(r.value)}`).filter(Boolean).join(" ");
  let dots="";
  rows.forEach((r,i)=>{ if(r.value!=null) dots += `<circle cx="${x(i)}" cy="${y(r.value)}" r="3.5" fill="${color}"><title>${esc(r.label)}: ${fmt(r.value)}</title></circle>`; });
  let overlayLine = "";
  if (opts.overlay){
    const oPts = opts.overlay.values.map((v,i)=> v==null?null:`${x(i)},${y(v)}`).filter(Boolean).join(" ");
    overlayLine = `<polyline points="${oPts}" fill="none" stroke="${opts.overlay.color||"#66738A"}" stroke-width="2.5" stroke-dasharray="7 5" stroke-linejoin="round"/>`;
  }
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    ${g}<polyline points="${ptsAttr}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>${overlayLine}${dots}</svg>`;
}

// simple hand-rolled SVG bar chart (baseline 0)
function barChart(rows, color, opts={}){
  const vals = rows.map(r=>r.value??0);
  if (!rows.length || vals.every(v=>v===0)) return `<div class="muted" style="padding:20px">${esc(opts.emptyMsg||"No data yet.")}</div>`;
  const W=520, H=250, padL=40, padR=10, padT=14, padB=26;
  const max = Math.max(...vals)*1.1 || 1;
  const iw=W-padL-padR, ih=H-padT-padB;
  const bw = iw/rows.length;
  const fmt = opts.fmt || (v=>Math.round(v*10)/10);
  let g="";
  for (let k=0;k<=4;k++){
    const v=max*k/4, yy=padT+(1-v/max)*ih;
    g += `<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="${chartGrid()}" stroke-dasharray="3 3"/>`;
    g += `<text x="${padL-6}" y="${yy+3}" font-size="10" fill="${chartLabel()}" text-anchor="end">${fmt(v)}</text>`;
  }
  let bars="";
  rows.forEach((r,i)=>{
    const v=r.value??0, bh=v/max*ih;
    const x=padL+i*bw+bw*0.15, y=padT+ih-bh;
    bars += `<rect x="${x}" y="${y}" width="${bw*0.7}" height="${Math.max(bh,0)}" rx="3" fill="${color}" opacity="${v===0?0.15:0.9}"><title>${esc(r.label)}: ${fmt(v)}</title></rect>`;
    if (opts.valueLabels && v>0){
      const cx = padL+i*bw+bw/2;
      if (bh > 24) bars += `<text x="${cx}" y="${y+14}" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">${fmt(v)}</text>`;
      else bars += `<text x="${cx}" y="${y-4}" font-size="10" font-weight="600" fill="${color}" text-anchor="middle">${fmt(v)}</text>`;
    }
    const step = Math.max(1, Math.ceil(rows.length/6));
    if (i%step===0||i===rows.length-1)
      g += `<text x="${padL+i*bw+bw/2}" y="${H-8}" font-size="10" fill="${chartLabel()}" text-anchor="middle">${esc(r.label)}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${g}${bars}</svg>`;
}
// rolling 7-day average of weigh-ins: for each entry, mean of entries in the trailing 7 days
function rolling7(sorted){
  return sorted.map((w,i)=>{
    const [y,m,d] = w.date.split("-").map(Number);
    const cut = new Date(y,m-1,d); cut.setDate(cut.getDate()-6);
    const cutIso = isoFromDate(cut);
    const win = sorted.filter(x=>x.date>=cutIso && x.date<=w.date);
    return Math.round(win.reduce((s,x)=>s+x.lbs,0)/win.length*10)/10;
  });
}
// sunday of the week containing iso date
function weekStartISO(iso){
  const [y,m,d]=iso.split("-").map(Number);
  const dt = new Date(y,m-1,d);
  dt.setDate(dt.getDate()-dt.getDay());
  return isoFromDate(dt);
}
// Riegel race prediction: t2 = t1 * (d2/d1)^1.06
const riegel = (t1,d1,d2) => t1*Math.pow(d2/d1,1.06);

let fb = null;          // {auth, db, uid}
let fbLoadPromise = null;
function parseFirebaseConfig(text){
  const grab = k => { const m = text.match(new RegExp(k + "\\s*:\\s*[\"']([^\"']+)[\"']")); return m ? m[1] : null; };
  const cfg = { apiKey:grab("apiKey"), authDomain:grab("authDomain"), projectId:grab("projectId"),
    storageBucket:grab("storageBucket"), messagingSenderId:grab("messagingSenderId"), appId:grab("appId") };
  return (cfg.apiKey && cfg.projectId && cfg.appId) ? cfg : null;
}
function loadFirebaseSdk(){
  if (fbLoadPromise) return fbLoadPromise;
  fbLoadPromise = new Promise((res, rej)=>{
    const urls = [
      "https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js",
      "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js",
      "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"
    ];
    let i = 0;
    const next = ()=>{
      if (i>=urls.length) return res();
      const s = document.createElement("script");
      s.src = urls[i++]; s.onload = next; s.onerror = ()=>rej(new Error("couldn't load sync library"));
      document.head.appendChild(s);
    };
    next();
  });
  return fbLoadPromise;
}
async function fbInit(){
  if (fb) return fb;
  const cfg = data.crew?.config;
  if (!cfg) throw new Error("not configured");
  await loadFirebaseSdk();
  if (!firebase.apps.length) firebase.initializeApp(cfg);
  const auth = firebase.auth();
  if (!auth.currentUser) await auth.signInAnonymously();
  fb = { auth, db: firebase.firestore(), uid: auth.currentUser.uid };
  return fb;
}
function myWeekStats(){
  const wk = weekStartISO(todayISO());
  const miles = data.cardio.filter(c=>c.type==="run" && weekStartISO(c.date)===wk)
    .reduce((s,c)=>s+c.distanceMi,0);
  const weekLifts = data.lifts.filter(w=>weekStartISO(w.date)===wk);
  const volume = weekLifts.reduce((s,w)=>s+w.exercises.reduce((a,ex)=>a+ex.sets.reduce((b,st)=>b+st.weight*st.reps,0),0),0);
  return { weekKey:wk, miles:Math.round(miles*10)/10, lifts:weekLifts.length, volume:Math.round(volume) };
}
async function crewPushStats(){
  if (!data.crew?.code) return;
  const {db, uid} = await fbInit();
  await db.collection("crews").doc(data.crew.code).collection("stats").doc(uid)
    .set({ name:data.crew.name, ...myWeekStats(), updatedAt:Date.now() });
}
async function crewFetchStats(){
  const {db} = await fbInit();
  const snap = await db.collection("crews").doc(data.crew.code).collection("stats").get();
  ui.crewStats = snap.docs.map(d=>({uid:d.id, ...d.data()}));
  ui.crewStatsAt = Date.now();
}
async function crewFetchTodos(){
  const {db} = await fbInit();
  const snap = await db.collection("crews").doc(data.crew.code).collection("todos")
    .orderBy("createdAt","desc").limit(50).get();
  ui.crewTodos = snap.docs.map(d=>({id:d.id, ...d.data()}));
}
async function crewSync(manual){
  if (!data.crew?.code) return;
  try {
    await crewPushStats();
    await crewFetchStats();
    if (ui.tab==="todo") await crewFetchTodos();
    if (manual) toast("Crew synced ✓");
    render();
  } catch(e){ if (manual) toast("Crew sync failed — check connection", true); }
}

function cardioPaceStat(c){

// deficit/surplus vs saved calorie goal: green under, red over
function kcalColor(kcal){
  const t = data.settings.kcalTarget;
  if (!t) return "var(--ink)";
  return kcal <= t ? "#2B8A3E" : "var(--danger)";
}
function kcalDelta(kcal){
  const t = data.settings.kcalTarget;
  if (!t) return "";
  const d = Math.round(kcal - t);
  if (d <= 0) return `<span style="color:#2B8A3E;font-family:var(--mono)">${d===0?"at goal":`−${Math.abs(d)} deficit`}</span>`;
  return `<span style="color:var(--danger);font-family:var(--mono)">+${d} surplus</span>`;
}
function parseCSV(text){
  // minimal RFC4180-ish parser: handles quoted fields with commas/newlines
  const rows=[]; let row=[], field="", inQ=false;
  for (let i=0;i<text.length;i++){
    const ch=text[i];
    if (inQ){
      if (ch==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; }
      else field+=ch;
    } else {
      if (ch==='"') inQ=true;
      else if (ch===","){ row.push(field); field=""; }
      else if (ch==="\n"||ch==="\r"){
        if (ch==="\r"&&text[i+1]==="\n") i++;
        row.push(field); field="";
        if (row.length>1||row[0]!=="") rows.push(row);
        row=[];
      }
      else field+=ch;
    }
  }
  if (field!==""||row.length){ row.push(field); rows.push(row); }
  return rows;
}
function parseCronometerCSV(text){
  const rows = parseCSV(text);
  if (rows.length < 2) throw new Error("File looks empty");
  const hdr = rows[0].map(h=>h.trim().toLowerCase());
  const findCol = (...needles) => hdr.findIndex(h=>needles.some(n=>h.startsWith(n)));
  const cDate = findCol("date");
  const cKcal = findCol("energy");
  const cProt = findCol("protein");
  const cCarb = findCol("carbs","carbohydrate");
  const cFat  = hdr.findIndex(h=>h==="fat (g)"||h==="fat"||h.startsWith("fat ("));
  const cFib  = findCol("fiber","fibre");
  if (cDate<0 || cKcal<0) throw new Error("Doesn't look like a Cronometer Daily Nutrition export");
  const hasGroup = findCol("group","diary group","day part") >= 0;
  const byD = {};
  for (let i=1;i<rows.length;i++){
    const r = rows[i];
    const rawDate = (r[cDate]||"").trim();
    if (!rawDate) continue;
    // Cronometer dates are YYYY-MM-DD; tolerate M/D/YYYY too
    let iso = rawDate;
    if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(rawDate)){
      const [m,d,y]=rawDate.split("/").map(Number); iso=`${y}-${pad(m)}-${pad(d)}`;
    }
    if (!/^\d{4}-\d{2}-\d{2}$/.test(iso)) continue;
    const num = c => { const v=parseFloat(r[c]); return isFinite(v)?v:0; };
    const e = { kcal:num(cKcal), protein:cProt>=0?num(cProt):0, carbs:cCarb>=0?num(cCarb):0, fat:cFat>=0?num(cFat):0, fiber:cFib>=0?num(cFib):0 };
    if (byD[iso] && hasGroup){ // per-meal rows: sum them
      for (const k of Object.keys(e)) byD[iso][k]+=e[k];
    } else byD[iso]=e; // daily totals: one row per date (last wins)
  }
  return Object.entries(byD)
    .filter(([,e]) => e.kcal > 0) // skip days with nothing logged so they don't skew trends
    .map(([date,e])=>({
      date, kcal:Math.round(e.kcal), protein:Math.round(e.protein), carbs:Math.round(e.carbs), fat:Math.round(e.fat), fiber:Math.round(e.fiber)
    }));
}

  if (ui.todoTab==="crew"){

    const members = (ui.crewStats||[]).filter(s=>s.uid!==(fb?.uid));
    html += `<div class="card" style="border-left:4px solid #B08D2F">
      <div class="lbl">Assign a task</div>
      <input id="crewTodoInput" placeholder="What needs doing?" enterkeyhint="done" style="margin-bottom:8px"
        onkeydown="if(event.key==='Enter'){event.preventDefault();App.crewAddTodo(this);}">
      <select id="crewAssign">
        <option value="all">Everyone</option>
        ${fb?`<option value="${fb.uid}">Me (${esc(data.crew.name)})</option>`:""}

    </div>`;
    const ct = ui.crewTodos || [];
    const openC = ct.filter(t=>!t.done), doneC = ct.filter(t=>t.done).slice(0,10);
    html += openC.map(t=>`<div class="todo-row" id="ctodo-${t.id}">
      <button class="todo-check" onclick="App.crewToggleTodo('${t.id}', true)"></button>
      <span class="todo-text">${esc(t.text)}<div style="font-size:11px;color:var(--sub);font-family:var(--mono)">${esc(t.createdByName||"?")} → ${esc(t.assignedToName||"Everyone")}</div></span>
    </div>`).join("");
    if (ui.crewTodos && !openC.length) html += `<div class="card muted">No open crew tasks.</div>`;
    if (!ui.crewTodos) html += `<div class="card muted">Loading crew tasks…</div>`;
    html += doneC.map(t=>`<div class="todo-row completed">
      <button class="todo-check" onclick="App.crewToggleTodo('${t.id}', false)">✓</button>
      <span class="todo-text">${esc(t.text)}<div style="font-size:11px;color:var(--sub);font-family:var(--mono);text-decoration:none">done by ${esc(t.doneBy||"?")}</div></span>
    </div>`).join("");
    html += `<button class="btn" style="background:transparent;border:1px solid var(--ink);color:var(--ink);margin-top:8px" onclick="App.crewSyncNow()">Refresh</button>`;

  } else {

    else html += `<div style="text-align:center;margin-top:6px">${delBtn("todos-clear", "App.clearDoneTodos()", "clear completed")}</div>`;
  }
  return html;
}
// satisfying two-tone chirp on task completion
function ding(){
  try {
    const ctx = ding._ctx || (ding._ctx = new (window.AudioContext||window.webkitAudioContext)());
    if (ctx.state === "suspended") ctx.resume();
    const t = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = "sine";
    o.frequency.setValueAtTime(880, t);
    o.frequency.setValueAtTime(1318.5, t+0.09);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.22, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.4);
    o.start(t); o.stop(t+0.45);
  } catch(e){}
}

// ----- progress -----
function renderProgress(){
  const back = (title) => `<div style="display:flex;align-items:center;gap:10px;margin:2px 0 10px">
    <button onclick="App.trendView(null)" style="background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:14px;font-weight:700;cursor:pointer;color:var(--ink)">‹ Trends</button>
    <div class="h2" style="margin:0">${title}</div></div>`;

  // ---------- bodyweight ----------
  if (ui.trendView==="weight"){
    let html = back("Bodyweight");
    const wRows = [...data.weights].sort((a,b)=>a.date<b.date?-1:1);
    const latestW = wRows[wRows.length-1];
    const avg7arr = rolling7(wRows);
    const avg7 = avg7arr.length ? avg7arr[avg7arr.length-1] : null;
    if (latestW){
      const first = wRows[0];
      const delta = wRows.length>1 ? Math.round((latestW.lbs-first.lbs)*10)/10 : null;

        ${stat("latest", latestW.lbs+" lb")}

    }
    html += `<div class="card">${lineChart(wRows.map(w=>({label:shortDate(w.date), value:w.lbs})), inkLine(),
      {emptyMsg:"Log at least two weigh-ins on the Weight tab to draw your trend.",
       overlay:{values:avg7arr, color:"#E8590C"}})}
      ${wRows.length>=2?`<div class="note" style="margin-top:6px">dashed orange line = 7-day average${avg7!=null?` (currently ${avg7} lb)`:""}</div>`:""}</div>`;
    return html;
  }

  // ---------- nutrition ----------
  if (ui.trendView==="food"){
    let html = back("Nutrition");
    const nRows = [...data.nutrition].sort((a,b)=>a.date<b.date?-1:1).slice(-30);
    if (nRows.length && data.settings.kcalTarget){
      const under = nRows.filter(d=>d.kcal<=data.settings.kcalTarget).length;
      const avgK = Math.round(nRows.reduce((s,d)=>s+d.kcal,0)/nRows.length);
      html += `<div class="card" style="border-left:4px solid var(--pull)">
        <div class="stats">
          <div class="stat"><div class="k">avg kcal</div><div class="v" style="color:${kcalColor(avgK)}">${avgK}</div></div>
          ${stat("days at/under goal", under+" / "+nRows.length)}
          ${stat("goal", data.settings.kcalTarget)}
        </div>
        <div style="font-size:12px;margin-top:8px">avg vs goal: ${kcalDelta(avgK)}</div>
      </div>`;
    }
    html += `<div class="card">
      <div class="lbl">Calories per day — last 30 logged days</div>
      ${lineChart(nRows.map(d=>({label:shortDate(d.date), value:d.kcal})), "#2B8A3E",
      {fmt:v=>Math.round(v), refLine:data.settings.kcalTarget||null,
       emptyMsg:"Import a Cronometer export or log days on the Food tab."})}</div>`;
    return html;
  }

  // ---------- runs ----------
  if (ui.trendView==="runs"){
    let html = back("Runs");
    const runs = data.cardio.filter(c=>c.type==="run" && c.distanceMi>0);
    const wkMiles = {};
    runs.forEach(r=>{ const wk=weekStartISO(r.date); wkMiles[wk]=(wkMiles[wk]||0)+r.distanceMi; });
    const thisWk = weekStartISO(todayISO());
    const weeks = [];
    { const [wy,wm,wd]=thisWk.split("-").map(Number); const dt=new Date(wy,wm-1,wd);
      for (let k=11;k>=0;k--){ const w=new Date(dt); w.setDate(dt.getDate()-7*k); weeks.push(isoFromDate(w)); } }
    const wkRows = weeks.map(w=>({label:shortDate(w), value:Math.round((wkMiles[w]||0)*10)/10}));
    const timed = runs.filter(r=>r.durationSec && r.distanceMi>=0.5);
    const cutoff = (()=>{ const d=new Date(); d.setDate(d.getDate()-60); return isoFromDate(d); })();
    let pool = timed.filter(r=>r.date>=cutoff);
    if (!pool.length) pool = timed;
    let mileEst=null, fiveKEst=null, basis=null;
    pool.forEach(r=>{
      const m = riegel(r.durationSec, r.distanceMi, 1);
      if (mileEst==null || m<mileEst){ mileEst=m; basis=r; }
      const f = riegel(r.durationSec, r.distanceMi, 3.10686);
      if (fiveKEst==null || f<fiveKEst) fiveKEst=f;
    });
    html += `<div class="card stats" style="border-left:4px solid var(--cardio)">
      ${stat("this week", (Math.round((wkMiles[thisWk]||0)*10)/10)+" mi")}
      ${stat("last week", (Math.round((wkMiles[weeks[10]]||0)*10)/10)+" mi")}
      ${stat("est mile", mileEst?fmtDur(Math.round(mileEst)):"—")}
      ${stat("est 5k", fiveKEst?fmtDur(Math.round(fiveKEst)):"—")}
    </div>`;
    html += `<div class="card">
      <div class="lbl">Weekly mileage — last 12 weeks</div>
      ${barChart(wkRows, "#1971C2", {valueLabels:true, emptyMsg:"Import a few runs and your weekly mileage will build here."})}
    </div>`;
    if (basis) html += `<div class="note">time estimates are based on your fastest recent run (${basis.distanceMi} mi on ${shortDate(basis.date)})</div>`;

    // ----- personal bests: actual elapsed time when each distance mark was reached mid-run -----
    const PB_DEFS = [["Mile","mile",1],["5K","fivek",3.10686],["10K","tenk",6.21371],["Half","half",13.1094],["Marathon","marathon",26.2188]];
    const pbCards = PB_DEFS.map(([label,key,dMi])=>{
      let best=null, bestRun=null;
      runs.forEach(r=>{
        let t = null;
        if (r.splits && r.splits[key]!=null) t = r.splits[key];             // real mid-run split
        else if (r.durationSec && Math.abs(r.distanceMi - dMi) < 0.06) t = r.durationSec; // whole run at that distance
        if (t!=null && (best==null || t<best)){ best=t; bestRun=r; }
      });
      return best!=null ? {label, time:best, run:bestRun} : null;
    }).filter(Boolean);
    if (pbCards.length){
      html += `<div class="card" style="margin-top:12px;border-left:4px solid var(--cardio)">
        <div class="lbl" style="margin-bottom:8px">Personal bests</div>
        ${pbCards.map(p=>`<div style="display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--grid)">
          <span style="font-weight:700;font-size:14px">${p.label}</span>
          <span style="font-family:var(--mono);font-size:14px;font-weight:600;color:var(--cardio)">${fmtDur(p.time)}</span>
          <span style="font-family:var(--mono);font-size:11px;color:var(--sub)">${shortDate(p.run.date)}</span>
        </div>`).join("")}
        <div style="font-family:var(--mono);font-size:10px;color:var(--sub);margin-top:6px">times are when you actually crossed each mark mid-run — re-upload old GPX files to add splits to past runs</div>
      </div>`;
    }

    // ----- total mileage this year -----
    const yr = new Date().getFullYear();
    const ytdRun = runs.filter(r=>r.date.startsWith(yr+"-")).reduce((s,r)=>s+r.distanceMi,0);
    const ytdWalk = data.cardio.filter(c=>c.type==="walk"&&c.date.startsWith(yr+"-")).reduce((s,c)=>s+c.distanceMi,0);
    html += `<div class="card stats" style="border-left:4px solid var(--cardio)">
      ${stat(yr+" run miles", (Math.round(ytdRun*10)/10))}
      ${stat(yr+" walk miles", (Math.round(ytdWalk*10)/10))}
      ${stat("total runs", runs.length)}
    </div>`;

    const hrRuns = runs.filter(r=>r.avgHr).sort((a,b)=>a.date<b.date?-1:1);
    if (hrRuns.length){
      html += `<div class="card" style="margin-top:12px">
        <div class="lbl">Average heart rate per run</div>
        ${lineChart(hrRuns.map(r=>({label:shortDate(r.date), value:r.avgHr})), "#FA5252",
        {fmt:v=>Math.round(v), emptyMsg:"Import at least two runs with heart rate to draw a trend."})}</div>
      <div class="note">same pace at a lower heart rate over time = aerobic fitness improving</div>`;
    }
    return html;
  }

  // ---------- lifts ----------
  if (ui.trendView==="lifts"){
    let html = back("Lifts");
    const logged = [...new Set(data.lifts.flatMap(w=>w.exercises.map(e=>e.name)))].sort();
    if (!logged.length)
      return html + `<div class="card muted">No lifts logged yet. Log a session in the Lift tab and your strength charts will build here.</div>`;
    if (!logged.includes(ui.progExercise)) ui.progExercise = logged[0];
    const rows = [];
    [...data.lifts].sort((a,b)=>a.date<b.date?-1:1).forEach(w=>{
      const ex = w.exercises.find(e=>e.name===ui.progExercise);
      if (!ex || !ex.sets.length) return;
      const top = Math.max(...ex.sets.map(s=>s.weight));
      const best = ex.sets.reduce((a,b)=> epley(b.weight,b.reps)>epley(a.weight,a.reps)?b:a);
      rows.push({
        label: shortDate(w.date),
        top, reps: Math.max(...ex.sets.filter(s=>s.weight===top).map(s=>s.reps)),
        e1rm: Math.round(epley(best.weight,best.reps))
      });
    });
    const last = rows[rows.length-1];
    html += `<div class="card"><div class="lbl">Movement (only logged ones shown)</div>
      <select onchange="App.progExercise(this.value)">${logged.map(e=>`<option ${e===ui.progExercise?"selected":""}>${esc(e)}</option>`).join("")}</select></div>`;
    if (last) html += `<div class="card stats" style="border-left:4px solid var(--push)">
      ${stat("last top set", last.top+"×"+last.reps)}
      ${stat("best est 1RM", Math.max(...rows.map(r=>r.e1rm))+" lb")}
      ${stat("sessions", rows.length)}</div>`;
    html += `<div class="card">
      <div class="lbl">Estimated 1RM over time</div>
      ${lineChart(rows.map(r=>({label:r.label, value:r.e1rm})), "#E8590C",
      {emptyMsg:`Log ${esc(ui.progExercise)} at least twice to draw a trend line.`, fmt:v=>Math.round(v)})}</div>`;
    return html;
  }

  // ---------- crew leaderboard ----------
  if (ui.trendView==="crew"){
    let html = back("Crew");
    if (!ui.crewStats){
      crewSync(false);
      html += `<div class="card muted">Loading leaderboard…</div>`;
      return html;
    }
    const wk = weekStartISO(todayISO());
    const rows = ui.crewStats.filter(s=>s.weekKey===wk);
    const stale = ui.crewStats.filter(s=>s.weekKey!==wk);
    const metric = ui.crewMetric;
    const fmtV = v => metric==="miles" ? (Math.round((v||0)*10)/10)+" mi" : metric==="volume" ? (v||0).toLocaleString()+" lb" : (v||0);
    rows.sort((a,b)=>(b[metric]||0)-(a[metric]||0));
    html += `<div class="seg">
      <button class="${metric==="miles"?"on":""}" onclick="App.crewMetric('miles')">Miles</button>
      <button class="${metric==="lifts"?"on":""}" onclick="App.crewMetric('lifts')">Lifts</button>
      <button class="${metric==="volume"?"on":""}" onclick="App.crewMetric('volume')">Volume</button>
    </div>`;
    html += `<div class="card" style="border-left:4px solid #B08D2F">
      <div class="lbl" style="margin-bottom:8px">This week — ${shortDate(wk)}</div>

  html += hubBtn("food","Nutrition","var(--pull)", avg7?`7-day avg <span style="color:${kcalColor(avg7)}">${avg7} kcal</span>`:"no days logged yet");
  html += hubBtn("runs","Runs","var(--cardio)", `${wkMi} mi this week`);

  if (data.crew?.code) html += hubBtn("crew","Crew","#B08D2F", `leaderboard · code ${data.crew.code}`);

  // ----- backup -----
  html += `<div class="h2" style="margin-top:18px">Data backup</div>`;
  if (ui.pendingRestore){
    const p = ui.pendingRestore;
    html += `<div class="card" style="background:#FFF8E6;border-color:#E0C878">
      <div style="font-size:13px;line-height:1.5;margin-bottom:10px"><b>Replace your current log with this backup?</b><br>

  }
  html += `<div class="card">
      <div style="font-size:13px;color:var(--sub);margin-bottom:10px;line-height:1.45">
        Your log lives on this device. Export a backup now and then and save it to iCloud Drive.</div>

      <button class="btn" style="background:transparent;border:1px solid var(--ink);color:var(--ink);margin-top:8px" onclick="document.getElementById('importFile').click()">Restore from backup</button>
    </div>
    <div class="note" style="margin-top:10px">Training Log — v26</div>`;

}

}

function svgRouteFallback(route){
  const lats = route.map(p=>p[0]), lons = route.map(p=>p[1]);
  const minLa=Math.min(...lats), maxLa=Math.max(...lats), minLo=Math.min(...lons), maxLo=Math.max(...lons);
  const W=400, H=220, pad=20;
  // approximate aspect correction for longitude at this latitude
  const latMid = (minLa+maxLa)/2, lonScale = Math.cos(latMid*Math.PI/180);
  const spanLa = Math.max(maxLa-minLa, 1e-5), spanLo = Math.max((maxLo-minLo)*lonScale, 1e-5);
  const sc = Math.min((W-2*pad)/spanLo, (H-2*pad)/spanLa);
  const x = lo => pad + ((lo-minLo)*lonScale)*sc + ((W-2*pad)-spanLo*sc)/2;
  const y = la => H - (pad + (la-minLa)*sc + ((H-2*pad)-spanLa*sc)/2);
  const ptsAttr = route.map(p=>`${x(p[1]).toFixed(1)},${y(p[0]).toFixed(1)}`).join(" ");
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%;display:block">
    <polyline points="${ptsAttr}" fill="none" stroke="#E8590C" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${x(route[0][1])}" cy="${y(route[0][0])}" r="5" fill="#2B8A3E"/>
    <circle cx="${x(route[route.length-1][1])}" cy="${y(route[route.length-1][0])}" r="5" fill="#C92A2A"/>
    <text x="${W/2}" y="${H-6}" font-size="10" fill="#66738A" text-anchor="middle">offline — route shape only</text>
  </svg>`;
}
function initMaps(){
  document.querySelectorAll("[data-route-map]").forEach(el=>{
    if (el.dataset.done) return;
    el.dataset.done = "1";
    const c = data.cardio.find(x=>x.id===el.dataset.routeMap);
    if (!c?.route) return;
    if (typeof L === "undefined"){ el.innerHTML = svgRouteFallback(c.route); return; }
    try {
      const map = L.map(el, {zoomControl:false, scrollWheelZoom:false});
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {maxZoom:19, attribution:"© OpenStreetMap"}).addTo(map);
      const line = L.polyline(c.route, {color:"#E8590C", weight:4, opacity:0.9});
      line.addTo(map);
      map.fitBounds(line.getBounds(), {padding:[18,18]});
      L.circleMarker(c.route[0], {radius:6, color:"#fff", weight:2, fillColor:"#2B8A3E", fillOpacity:1}).addTo(map);
      L.circleMarker(c.route[c.route.length-1], {radius:6, color:"#fff", weight:2, fillColor:"#C92A2A", fillOpacity:1}).addTo(map);
      setTimeout(()=>map.invalidateSize(), 50);
    } catch(e){ el.innerHTML = svgRouteFallback(c.route); }
  });
}

// gpx upload
$("#gpxFile").addEventListener("change", async e=>{
  const files = Array.from(e.target.files||[]);
  let errShown = 0;
  for (const f of files){
    try {
      const lower = f.name.toLowerCase();
      let text;
      if (lower.endsWith(".fit") || lower.endsWith(".fit.gz")){
        throw new Error("FIT files aren't supported — this run came from a watch/device, not the Strava app");
      } else if (lower.endsWith(".gz")){
        if (typeof DecompressionStream === "undefined") throw new Error("can't unzip on this device — extract the .gz first");
        const ds = new DecompressionStream("gzip");
        text = await new Response(f.stream().pipeThrough(ds)).text();
      } else {
        text = await f.text();
      }
      ui.pending.push({...parseGPX(text), fileName:f.name});
    }
    catch(err){ if (errShown++ < 2) toast(`${f.name}: ${err.message}`, true); }
  }
  e.target.value = "";
  render();
});
// cronometer csv upload
$("#csvFile").addEventListener("change", async e=>{
  const f = e.target.files?.[0]; if(!f) return;
  try {
    const parsed = parseCronometerCSV(await f.text());
    if (!parsed.length) throw new Error("No daily rows found in file");
    const dates = new Set(parsed.map(p=>p.date));
    data.nutrition = data.nutrition.filter(d=>!dates.has(d.date));
    parsed.forEach(p=>data.nutrition.push({id:uid(), ...p, source:"cronometer"}));
    save();
    const ds = [...dates].sort();
    toast(`Imported ${parsed.length} day${parsed.length>1?"s":""} (${shortDate(ds[0])}–${shortDate(ds[ds.length-1])}) ✓`);
    render();
  } catch(err){ toast(err.message, true); }
  e.target.value = "";
});
// backup restore (confirmed in-app, not via native dialog)
$("#importFile").addEventListener("change", async e=>{
  const f = e.target.files?.[0]; if(!f) return;
  try {
    const parsed = JSON.parse(await f.text());
    if (!parsed || !Array.isArray(parsed.lifts)) throw new Error("bad format");
    ui.pendingRestore = parsed;
    ui.tab = "progress";
    render();
  } catch(err){ toast("That file isn't a valid backup", true); }
  e.target.value = "";
});

applyTheme();
render();
if (data.crew?.code) crewSync(false);

</script>
